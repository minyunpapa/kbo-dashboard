name: Update dashboard data

on:
  schedule:
    # KST = UTC+9
    - cron: '30 0 * * *'    # 09:30 KST — 선발 예고 갱신
    - cron: '10 4 * * 6,0'  # 13:10 KST 주말 — 14:00 경기 라인업
    - cron: '10 7 * * *'    # 16:10 KST — 주말 17:00 경기 라인업
    - cron: '40 8 * * *'    # 17:40 KST — 평일 18:30 경기 라인업
    - cron: '0 14 * * *'    # 23:00 KST — 경기 결과·박스스코어
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Collect season data
        run: python collect.py
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js records_cache.json roster.json
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git push
          fi
